# Deux services Render sur le MEME repo GitHub :
#
# 1) tournament-manager (prod) → branche main → Hub + Engine + Manager Live
#    URL : https://tournament-manager-9ytu.onrender.com
#
# 2) tournament-manager-preview → staging (optionnel, branche feature/*)
#
# 3) tournament-manager-engine-v2 → branche feature/engine-v2 → Engine V2 (render PDF)
#    URL : https://tournament-manager-engine-v2.onrender.com
#    PDF via PyMuPDF + rendu Live — pas de LibreOffice. N'affecte pas Engine prod ni preview Hub.
#
services:
  - type: web
    name: tournament-manager
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: live-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DEPLOY_TARGET
        value: engine
      - key: PDF_CONVERTER
        value: libreoffice
      - key: LIVE_DATA_DIR
        value: /data/_live
      - key: OWNER_EMAIL
        value: remi.difrancia.perso@gmail.com
      - key: EMAIL_FROM
        value: Padel Tournament Engine <onboarding@resend.dev>

  - type: web
    name: tournament-manager-engine-v2
    runtime: docker
    plan: starter
    branch: feature/engine-v2
    dockerfilePath: ./Dockerfile.engine-v2
    dockerContext: .
    healthCheckPath: /api/v2/health
    autoDeploy: true
    envVars:
      - key: DEPLOY_TARGET
        value: engine-v2
      - key: PDF_CONVERTER
        value: libreoffice
      - key: OWNER_EMAIL
        value: remi.difrancia.perso@gmail.com
      - key: EMAIL_FROM
        value: Padel Tournament Engine <onboarding@resend.dev>

  - type: web
    name: tournament-manager-preview
    runtime: docker
    plan: starter
    branch: feature/manager
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: false
    disk:
      name: live-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DEPLOY_TARGET
        value: manager-preview
      - key: ENGINE_GENERATE_URL
        value: https://tournament-manager-9ytu.onrender.com
      - key: PDF_CONVERTER
        value: libreoffice
      - key: LIVE_DATA_DIR
        value: /data/_live
      - key: OWNER_EMAIL
        value: remi.difrancia.perso@gmail.com
      - key: EMAIL_FROM
        value: Padel Tournament Engine <onboarding@resend.dev>
