# IMPORTANT : le service Render "tournament-manager.onrender.com" actuel
# sert encore une ancienne app React (Create React App), pas ce projet.
# Pour déployer cette app : Dashboard Render → New → Blueprint → ce repo,
# ou recréer le service en runtime Docker sur remidifranciaperso-bit/tournament-manager.
services:
  - type: web
    name: padel-tournament-engine
    runtime: docker
    plan: starter
    repo: https://github.com/remidifranciaperso-bit/tournament-manager
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PDF_CONVERTER
        value: libreoffice
