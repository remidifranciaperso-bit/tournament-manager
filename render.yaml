# Deux services Render sur le MEME repo GitHub :
#
# 1) tournament-manager (prod) → branche main → Hub + Engine + Manager Live
#    URL : https://tournament-manager-9ytu.onrender.com
#
# 2) tournament-manager-preview → staging (optionnel, branche feature/*)
#
services:
  - type: web
    name: tournament-manager
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: live-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DEPLOY_TARGET
        value: engine
      - key: PDF_CONVERTER
        value: libreoffice
      - key: LIVE_DATA_DIR
        value: /data/_live
      - key: OWNER_EMAIL
        value: remi.difrancia.perso@gmail.com
      - key: EMAIL_FROM
        value: Padel Tournament Engine <onboarding@resend.dev>

  - type: web
    name: tournament-manager-preview
    runtime: docker
    plan: starter
    branch: feature/manager
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: false
    disk:
      name: live-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DEPLOY_TARGET
        value: engine
      - key: PDF_CONVERTER
        value: libreoffice
      - key: LIVE_DATA_DIR
        value: /data/_live
      - key: OWNER_EMAIL
        value: remi.difrancia.perso@gmail.com
      - key: EMAIL_FROM
        value: Padel Tournament Engine <onboarding@resend.dev>
