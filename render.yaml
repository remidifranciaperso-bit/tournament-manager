services:
  - type: web
    name: tournament-manager
    runtime: docker
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PDF_CONVERTER
        value: libreoffice
      - key: OWNER_EMAIL
        value: remi.difrancia.perso@gmail.com
      - key: EMAIL_FROM
        value: Padel Tournament Engine <onboarding@resend.dev>
